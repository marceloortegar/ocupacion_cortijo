<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Ocupación — Cortijo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1d23;
    --sidebar: #252930;
    --card: #2e333d;
    --surface: #f7f6f2;
    --text-primary: #f0efe9;
    --text-muted: #8b909c;
    --text-dark: #1a1d23;
    --accent: #4caf82;
    --danger: #e05252;
    --warning: #e09a52;
    --border: #35393f;
    --sidebar-width: 340px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── LOADING SCREEN ── */
  #loadingScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
  }

  #loadingScreen.hidden { display: none; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loadingScreen p {
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .sync-status {
    font-size: 11px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
  }

  .sync-dot.connected { background: var(--accent); }
  .sync-dot.error { background: var(--danger); }

  .sync-label { color: var(--text-muted); }

  .capacity-section {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .capacity-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .cap-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cap-field label {
    font-size: 11px;
    color: var(--text-muted);
  }

  .cap-field input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    padding: 6px 10px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .cap-field input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .add-btn {
    margin: 16px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: calc(100% - 48px);
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .add-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .add-btn:active { transform: translateY(0); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .selected-panel {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }

  .selected-panel::-webkit-scrollbar { width: 4px; }
  .selected-panel::-webkit-scrollbar-track { background: transparent; }
  .selected-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .no-selection {
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    margin-top: 24px;
    line-height: 1.6;
  }

  .selected-date-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-primary);
  }

  .booking-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .booking-card .bk-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    padding-right: 20px;
  }

  .booking-card .bk-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }

  .booking-card .bk-beds {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }

  .bed-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
  }

  .delete-btn:hover { color: var(--danger); background: rgba(224,82,82,0.1); }

  .occ-bar-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  .occ-bar-item { flex: 1; }

  .occ-bar-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
  }

  .occ-bar-track {
    height: 4px;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
  }

  .occ-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 24px;
    gap: 16px;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .cal-nav h2 {
    font-size: 20px;
    font-weight: 700;
    flex: 1;
    text-transform: capitalize;
  }

  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: var(--border); }

  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  .cal-grid {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 0 8px;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    flex: 1;
  }

  .cal-day {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .cal-day:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cal-day.empty { background: transparent; border: 1px solid transparent; cursor: default; pointer-events: none; }
  .cal-day.today { border-color: var(--accent); }
  .cal-day.selected { border-color: var(--accent); background: rgba(76,175,130,0.12); }
  .cal-day.over-capacity { background: rgba(224,82,82,0.12); border-color: var(--danger); }
  .cal-day.over-capacity:hover { background: rgba(224,82,82,0.2); }
  .cal-day.partial { border-color: var(--warning); }

  .day-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
  }

  .cal-day.today .day-num { color: var(--accent); }
  .cal-day.over-capacity .day-num { color: var(--danger); }

  .day-bookings {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .day-pill {
    font-size: 9px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-muted);
    padding: 1px 0;
  }

  .day-progress { margin-top: 4px; }

  .day-progress-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--bg);
    overflow: hidden;
    margin-bottom: 2px;
  }

  .day-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--sidebar);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 440px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }

  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    transition: border-color 0.15s;
  }

  .form-group input:focus { outline: none; border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--card);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .btn-secondary:hover { color: var(--text-primary); }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--accent);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    transform: translateY(60px);
    opacity: 0;
    transition: transform 0.25s, opacity 0.25s;
    z-index: 200;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 700px) {
    body { flex-direction: column; overflow: auto; }
    #sidebar { width: 100%; min-width: 0; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    #main { padding: 16px; overflow: visible; }
    .cal-day { min-height: 52px; }
    .day-pill { display: none; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>Conectando con la base de datos…</p>
</div>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">
    <h1>Gestor de Ocupación</h1>
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span class="sync-label" id="syncLabel">Conectando…</span>
    </div>
  </div>

  <div class="capacity-section">
    <div class="section-label">Camas disponibles</div>
    <div class="capacity-inputs">
      <div class="cap-field">
        <label>Individual</label>
        <input type="number" id="capSingle" min="0" value="4" placeholder="0">
      </div>
      <div class="cap-field">
        <label>Doble</label>
        <input type="number" id="capDouble" min="0" value="4" placeholder="0">
      </div>
    </div>
  </div>

  <button class="add-btn" id="addBtn" onclick="openModal()">+ Nueva reserva</button>

  <div class="selected-panel" id="selectedPanel">
    <div class="no-selection">Selecciona un día en el calendario para ver las reservas activas.</div>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <div class="cal-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <h2 id="monthTitle"></h2>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Disponible</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--warning)"></div> Capacidad ajustada</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div> Sin capacidad</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--card); border:1px solid var(--accent)"></div> Hoy</div>
  </div>

  <div class="cal-grid">
    <div class="cal-weekdays">
      <div class="cal-weekday">Lun</div>
      <div class="cal-weekday">Mar</div>
      <div class="cal-weekday">Mié</div>
      <div class="cal-weekday">Jue</div>
      <div class="cal-weekday">Vie</div>
      <div class="cal-weekday">Sáb</div>
      <div class="cal-weekday">Dom</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3>Nueva reserva</h3>
    <div class="form-group">
      <label>Nombre / Grupo</label>
      <input type="text" id="fName" placeholder="Ej: Familia García">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha entrada</label>
        <input type="date" id="fStart">
      </div>
      <div class="form-group">
        <label>Fecha salida</label>
        <input type="date" id="fEnd">
      </div>
    </div>
    <div class="form-group">
      <label>Número de personas</label>
      <input type="number" id="fPeople" min="1" value="1">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Camas individuales</label>
        <input type="number" id="fSingle" min="0" value="0">
      </div>
      <div class="form-group">
        <label>Camas dobles</label>
        <input type="number" id="fDouble" min="0" value="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="saveBtn" onclick="saveBooking()">Guardar reserva</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ── FIREBASE ── -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    onSnapshot,
    addDoc,
    deleteDoc,
    doc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQhFJtE-FUtyaXfZvQDLaEb8r9nImOi4I",
    authDomain: "cortijo-2026.firebaseapp.com",
    projectId: "cortijo-2026",
    storageBucket: "cortijo-2026.firebasestorage.app",
    messagingSenderId: "920225369893",
    appId: "1:920225369893:web:b788155d6a29a57fa254cc"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── STATE ──
  let bookings = [];
  let selectedDate = null;
  let currentYear, currentMonth;

  const today = new Date();
  currentYear  = today.getFullYear();
  currentMonth = today.getMonth();

  // ── FIRESTORE LISTENER (tiempo real) ──
  // Cada vez que alguien añada o elimine una reserva, todos los navegadores se actualizan automáticamente
  onSnapshot(collection(db, "bookings"), (snapshot) => {
    bookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('loadingScreen').classList.add('hidden');
    setSyncStatus(true);
    renderCalendar();
    renderSidebar();
  }, (err) => {
    console.error(err);
    setSyncStatus(false);
    document.getElementById('loadingScreen').classList.add('hidden');
  });

  // ── SYNC STATUS ──
  function setSyncStatus(ok) {
    const dot   = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    dot.className   = 'sync-dot ' + (ok ? 'connected' : 'error');
    label.textContent = ok ? 'Sincronizado en tiempo real' : 'Sin conexión';
  }

  // ── UTILS ──
  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function parseDateKey(key) {
    const [y, m, d] = key.split('-').map(Number);
    return new Date(y, m-1, d);
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? 'var(--danger)' : 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── CAPACIDAD ──
  function getCapacity() {
    return {
      single: parseInt(document.getElementById('capSingle').value) || 0,
      double: parseInt(document.getElementById('capDouble').value) || 0
    };
  }

  function getBookingsForDate(dateStr) {
    return bookings.filter(b => dateStr >= b.start && dateStr <= b.end);
  }

  function getOccupancyForDate(dateStr) {
    const dayBks = getBookingsForDate(dateStr);
    return {
      single:   dayBks.reduce((s, b) => s + (b.single || 0), 0),
      double:   dayBks.reduce((s, b) => s + (b.double || 0), 0),
      bookings: dayBks
    };
  }

  function getStatusForDate(dateStr) {
    const { single, double } = getOccupancyForDate(dateStr);
    const cap = getCapacity();
    if (!cap.single && !cap.double) return 'ok';
    if ((cap.single > 0 && single > cap.single) || (cap.double > 0 && double > cap.double)) return 'over';
    const pctS = cap.single > 0 ? single / cap.single : 0;
    const pctD = cap.double > 0 ? double / cap.double : 0;
    if (pctS >= 0.8 || pctD >= 0.8) return 'partial';
    if (single > 0 || double > 0) return 'occupied';
    return 'ok';
  }

  // ── CALENDARIO ──
  function renderCalendar() {
    const title = new Date(currentYear, currentMonth, 1)
      .toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
    document.getElementById('monthTitle').textContent = title;

    const firstDay    = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const startOffset = (firstDay === 0 ? 6 : firstDay - 1);
    const cap         = getCapacity();

    const container = document.getElementById('calDays');
    container.innerHTML = '';

    for (let i = 0; i < startOffset; i++) {
      const e = document.createElement('div');
      e.className = 'cal-day empty';
      container.appendChild(e);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = dateKey(currentYear, currentMonth, d);
      const { single, double, bookings: dayBks } = getOccupancyForDate(key);
      const status = getStatusForDate(key);

      const isToday    = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
      const isSelected = key === selectedDate;

      const cell = document.createElement('div');
      cell.className = 'cal-day';
      if (isToday)    cell.classList.add('today');
      if (isSelected) cell.classList.add('selected');
      if (status === 'over')    cell.classList.add('over-capacity');
      if (status === 'partial') cell.classList.add('partial');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if ((cap.single > 0 || cap.double > 0) && (single > 0 || double > 0)) {
        const prog = document.createElement('div');
        prog.className = 'day-progress';
        if (cap.single > 0) {
          const pct   = Math.min(single / cap.single, 1) * 100;
          const color = single > cap.single ? 'var(--danger)' : single/cap.single >= 0.8 ? 'var(--warning)' : 'var(--accent)';
          prog.innerHTML += `<div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%;background:${color}"></div></div>`;
        }
        if (cap.double > 0) {
          const pct   = Math.min(double / cap.double, 1) * 100;
          const color = double > cap.double ? 'var(--danger)' : double/cap.double >= 0.8 ? 'var(--warning)' : 'var(--accent)';
          prog.innerHTML += `<div class="day-progress-bar"><div class="day-progress-fill" style="width:${pct}%;background:${color}"></div></div>`;
        }
        cell.appendChild(prog);
      }

      if (dayBks.length > 0) {
        const pills = document.createElement('div');
        pills.className = 'day-bookings';
        dayBks.slice(0, 3).forEach(b => {
          const pill = document.createElement('div');
          pill.className = 'day-pill';
          pill.textContent = b.name;
          pills.appendChild(pill);
        });
        if (dayBks.length > 3) {
          const more = document.createElement('div');
          more.className = 'day-pill';
          more.textContent = `+${dayBks.length - 3} más`;
          pills.appendChild(more);
        }
        cell.appendChild(pills);
      }

      cell.addEventListener('click', () => { selectedDate = key; renderCalendar(); renderSidebar(); });
      container.appendChild(cell);
    }
  }

  // ── SIDEBAR PANEL ──
  function renderSidebar() {
    const panel = document.getElementById('selectedPanel');
    if (!selectedDate) {
      panel.innerHTML = '<div class="no-selection">Selecciona un día en el calendario para ver las reservas activas.</div>';
      return;
    }

    const d     = parseDateKey(selectedDate);
    const label = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    const { single, double, bookings: dayBks } = getOccupancyForDate(selectedDate);
    const cap = getCapacity();

    let html = `<div class="selected-date-title">${label}</div>`;

    if (cap.single > 0 || cap.double > 0) {
      html += `<div class="occ-bar-row">`;
      if (cap.single > 0) {
        const pct   = Math.min(single / cap.single, 1) * 100;
        const color = single > cap.single ? 'var(--danger)' : single/cap.single >= 0.8 ? 'var(--warning)' : 'var(--accent)';
        html += `<div class="occ-bar-item">
          <div class="occ-bar-label"><span>Individual</span><span>${single}/${cap.single}</span></div>
          <div class="occ-bar-track"><div class="occ-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }
      if (cap.double > 0) {
        const pct   = Math.min(double / cap.double, 1) * 100;
        const color = double > cap.double ? 'var(--danger)' : double/cap.double >= 0.8 ? 'var(--warning)' : 'var(--accent)';
        html += `<div class="occ-bar-item">
          <div class="occ-bar-label"><span>Doble</span><span>${double}/${cap.double}</span></div>
          <div class="occ-bar-track"><div class="occ-bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>`;
      }
      html += `</div>`;
    }

    if (dayBks.length === 0) {
      html += `<div class="no-selection" style="margin-top:16px">Sin reservas para este día.</div>`;
    } else {
      dayBks.forEach(b => {
        html += `<div class="booking-card">
          <button class="delete-btn" onclick="window._deleteBooking('${b.id}')">✕</button>
          <div class="bk-name">${b.name}</div>
          <div class="bk-meta">
            ${b.people} persona${b.people !== 1 ? 's' : ''} &nbsp;·&nbsp; ${b.start} → ${b.end}
          </div>
          <div class="bk-beds">
            ${b.single > 0 ? `<span class="bed-tag">▪ ${b.single} ind.</span>` : ''}
            ${b.double > 0 ? `<span class="bed-tag">▪ ${b.double} dbl.</span>` : ''}
          </div>
        </div>`;
      });
    }

    panel.innerHTML = html;
  }

  // ── MODAL ──
  window.openModal = function() {
    document.getElementById('fName').value   = '';
    document.getElementById('fPeople').value = 1;
    document.getElementById('fSingle').value = 0;
    document.getElementById('fDouble').value = 0;
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('fStart').value = selectedDate || todayStr;
    document.getElementById('fEnd').value   = selectedDate || todayStr;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('fName').focus();
  };

  window.closeModal = function(e) {
    if (!e || e.target === document.getElementById('modalOverlay')) {
      document.getElementById('modalOverlay').classList.remove('open');
    }
  };

  window.saveBooking = async function() {
    const name   = document.getElementById('fName').value.trim();
    const start  = document.getElementById('fStart').value;
    const end    = document.getElementById('fEnd').value;
    const people = parseInt(document.getElementById('fPeople').value) || 1;
    const single = parseInt(document.getElementById('fSingle').value) || 0;
    const double = parseInt(document.getElementById('fDouble').value) || 0;

    if (!name)         { showToast('El nombre es obligatorio', true); return; }
    if (!start || !end){ showToast('Las fechas son obligatorias', true); return; }
    if (end < start)   { showToast('La fecha de salida no puede ser anterior a la entrada', true); return; }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Guardando…';

    try {
      await addDoc(collection(db, "bookings"), {
        name, start, end, people, single, double,
        createdAt: serverTimestamp()
      });
      window.closeModal();
      showToast(`Reserva de "${name}" guardada`);
    } catch (err) {
      console.error(err);
      showToast('Error al guardar. Comprueba la conexión.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Guardar reserva';
    }
  };

  window._deleteBooking = async function(id) {
    if (!confirm('¿Eliminar esta reserva?')) return;
    try {
      await deleteDoc(doc(db, "bookings", id));
      showToast('Reserva eliminada');
    } catch (err) {
      showToast('Error al eliminar.', true);
    }
  };

  // ── NAVEGACIÓN ──
  window.changeMonth = function(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    renderCalendar();
  };

  // ── CAPACIDAD (recalcula en tiempo real al cambiar) ──
  document.getElementById('capSingle').addEventListener('input', () => { renderCalendar(); renderSidebar(); });
  document.getElementById('capDouble').addEventListener('input', () => { renderCalendar(); renderSidebar(); });

  // ── TECLADO ──
  document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });

  // Render inicial (sin datos aún, pero pinta estructura)
  renderCalendar();
</script>
</body>
</html>
